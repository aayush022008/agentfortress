input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  if [service] == "agentshield" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }

    date {
      match => ["timestamp", "UNIX", "ISO8601"]
      target => "@timestamp"
    }

    if [severity] == "critical" or [severity] == "high" {
      mutate {
        add_tag => ["security_alert"]
      }
    }

    geoip {
      source => "[source_ip]"
      target => "[geoip]"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "agentshield-%{+YYYY.MM.dd}"
  }

  if "security_alert" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
