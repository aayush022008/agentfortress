apiVersion: v1
kind: Secret
metadata:
  name: agentshield-secrets
  namespace: agentshield
type: Opaque
stringData:
  # Replace with actual values — do not commit real secrets
  SECRET_KEY: "REPLACE_WITH_STRONG_SECRET_KEY"
  API_KEY: "REPLACE_WITH_API_KEY"
  DATABASE_URL: "postgresql://agentshield:REPLACE_DB_PASSWORD@postgres:5432/agentshield"
  REDIS_URL: "redis://redis:6379/0"
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_KEY"
  SLACK_WEBHOOK_URL: "REPLACE_WITH_SLACK_WEBHOOK"
  PAGERDUTY_ROUTING_KEY: "REPLACE_WITH_PAGERDUTY_KEY"
  JWT_PRIVATE_KEY: "REPLACE_WITH_RSA_PRIVATE_KEY_PEM"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentshield-postgres-secret
  namespace: agentshield
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"
  POSTGRES_USER: "agentshield"
  POSTGRES_DB: "agentshield"
