apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentshield-server
  namespace: agentshield
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentshield-server-role
  namespace: agentshield
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentshield-server-binding
  namespace: agentshield
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentshield-server-role
subjects:
  - kind: ServiceAccount
    name: agentshield-server
    namespace: agentshield
