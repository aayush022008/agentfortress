apiVersion: v1
kind: Service
metadata:
  name: agentshield-server
  namespace: agentshield
spec:
  selector:
    app: agentshield-server
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: agentshield-dashboard
  namespace: agentshield
spec:
  selector:
    app: agentshield-dashboard
  ports:
    - port: 80
      targetPort: 80
