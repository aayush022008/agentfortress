global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "agentshield"

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "agentshield-server"
    static_configs:
      - targets: ["server:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
