version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agentshield
      POSTGRES_USER: agentshield
      POSTGRES_PASSWORD: agentshield_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: ../server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentshield:agentshield_password@postgres/agentshield
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: admin-secret-change-me
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../threat-intel:/app/threat_intel:ro

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - dashboard

volumes:
  postgres_data:
